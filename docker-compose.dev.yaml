services:
  app:
    container_name: app
    build: .
    command: ./.docker/start.sh
    ports:
      - 3000:3000
    volumes:
      - .:/home/node/app
  db:
    image: mysql:8.0.30-debian
    platform: linux/amd64
    ports:
      - 3306:3306
    environment:
      - MYSQL_DATABASE=micro_videos
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./docker/mysql:/var/lib/mysql:delegated
    security_opt:
      - seccomp:unconfined